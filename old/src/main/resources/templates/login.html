<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlanToPlate</title>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-800 rounded-lg shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6">
            <h1 class="text-2xl font-bold text-white text-center">Welcome to PlanToPlate</h1>
            <p class="text-blue-100 text-center mt-1">Please sign in to continue</p>
        </div>

        <!-- Form -->
        <form th:action="@{/auth/login}" method="post" class="p-6 space-y-4">
            <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${message}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                <span th:text="${message}"></span>
            </div>

            <div class="space-y-2">
                <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    autocomplete="username"
                    placeholder="Enter your username"
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>

            <div class="space-y-2">
                <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    autocomplete="current-password"
                    placeholder="Enter your password"
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200"
            >
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="bg-gray-900 p-4 text-center text-sm text-gray-500">
            &copy; 2026 PlanToPlate. All rights reserved.
        </div>
    </div>
</body>
</html>
