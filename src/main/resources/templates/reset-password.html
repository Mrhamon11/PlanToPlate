<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PlanToPlate</title>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-800 rounded-lg shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-yellow-600 p-6">
            <h1 class="text-2xl font-bold text-white text-center">Temporary Password Expired</h1>
            <p class="text-yellow-100 text-center mt-1">Please reset your password to continue</p>
        </div>

        <!-- Form -->
        <form th:action="@{/auth/reset-password}" method="post" class="p-6 space-y-4">
            <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${message}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                <span th:text="${message}"></span>
            </div>

            <div class="space-y-2 bg-gray-900 p-4 rounded-lg">
                <label for="username" class="block text-sm font-medium text-gray-300">Your Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    th:value="${username}"
                    readonly
                    class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-gray-300 placeholder-gray-500 focus:outline-none cursor-not-allowed"
                />
            </div>

            <div class="space-y-2">
                <label for="currentPassword" class="block text-sm font-medium text-gray-300">Current Password</label>
                <input 
                    type="password" 
                    id="currentPassword" 
                    name="currentPassword" 
                    required 
                    autocomplete="current-password"
                    placeholder="Enter your current password for verification"
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                />
            </div>

            <div class="space-y-2">
                <label for="newPassword" class="block text-sm font-medium text-gray-300">New Password</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    name="newPassword" 
                    required 
                    autocomplete="new-password"
                    placeholder="Enter your new password"
                    minlength="8"
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                />
            </div>

            <button 
                type="submit" 
                class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200"
            >
                Reset Password
            </button>

            <a 
                th:href="@{/}" 
                class="block w-full text-center text-sm text-gray-400 hover:text-gray-300 mt-2"
            >
                Cancel and go home (if not temp password)
            </a>
        </form>

        <!-- Footer -->
        <div class="bg-gray-900 p-4 text-center text-sm text-gray-500">
            &copy; 2026 PlanToPlate. All rights reserved.
        </div>
    </div>
</body>
</html>
